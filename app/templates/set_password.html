<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear Contrasena</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;
    min-height:100dvh;padding:1rem}
  .card{background:#1e293b;border-radius:1rem;padding:2.5rem 2rem;width:100%;max-width:380px;
    text-align:center;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
  .icon{font-size:2.5rem;margin-bottom:.75rem}
  h1{font-size:1.2rem;font-weight:600;margin-bottom:.25rem}
  .sub{font-size:.85rem;color:#94a3b8;margin-bottom:1.75rem}
  .field{margin-bottom:1rem;text-align:left}
  label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:.4rem;font-weight:500}
  input[type=password]{
    width:100%;padding:.7rem 1rem;
    border:2px solid #334155;border-radius:.65rem;
    background:#0f172a;color:#f1f5f9;font-size:.95rem;outline:none;
    transition:border-color .15s}
  input:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.2)}
  .btn{width:100%;padding:.8rem;background:#10b981;color:#fff;border:none;
    border-radius:.65rem;font-size:.95rem;font-weight:600;cursor:pointer;
    transition:background .15s;margin-top:.5rem}
  .btn:hover{background:#059669}
  .btn:disabled{background:#475569;cursor:not-allowed}
  .error{color:#f87171;font-size:.85rem;margin-bottom:.75rem;
    background:#450a0a;padding:.5rem .75rem;border-radius:.5rem;display:none}
  .error.show{display:block}
  .hint{font-size:.78rem;color:#64748b;margin-top:.3rem}
  .user-badge{display:inline-flex;align-items:center;gap:.4rem;background:#0f172a;
    padding:.3rem .8rem;border-radius:.5rem;font-size:.85rem;margin-bottom:1.5rem;
    color:#94a3b8}
  .user-badge strong{color:#f1f5f9}
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#128273;</div>
  <h1>Crea tu contrasena</h1>
  <p class="sub">Es tu primer acceso — elige una contrasena segura</p>

  <div class="user-badge">
    Usuario: <strong>{{ username }}</strong>
  </div>

  <div class="error {% if error %}show{% endif %}">
    {% if error %}{{ error }}{% endif %}
  </div>

  <form id="setPwForm" method="post" action="/set-password">
    <div class="field">
      <label for="password">Nueva contrasena</label>
      <input type="password" id="password" name="password" autocomplete="new-password"
             placeholder="min. 8 caracteres" autofocus minlength="8">
      <p class="hint">Minimo 8 caracteres</p>
    </div>
    <div class="field">
      <label for="password2">Confirmar contrasena</label>
      <input type="password" id="password2" name="password2" autocomplete="new-password"
             placeholder="repite la contrasena">
    </div>
    <button type="submit" class="btn" id="submitBtn">Guardar y entrar</button>
  </form>
</div>
<script>
document.getElementById('setPwForm').addEventListener('submit', function(e){
  var p1 = document.getElementById('password').value;
  var p2 = document.getElementById('password2').value;
  if(p1 !== p2){
    e.preventDefault();
    var err = document.querySelector('.error');
    err.textContent = 'Las contrasenas no coinciden.';
    err.classList.add('show');
    return;
  }
  if(p1.length < 8){
    e.preventDefault();
    var err = document.querySelector('.error');
    err.textContent = 'La contrasena debe tener al menos 8 caracteres.';
    err.classList.add('show');
    return;
  }
  document.getElementById('submitBtn').disabled = true;
});
</script>
</body>
</html>
