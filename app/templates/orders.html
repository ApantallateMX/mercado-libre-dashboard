{% extends "base.html" %}

{% block title %}Ventas{% endblock %}

{% block content %}
<div class="mb-5">
    <h1 class="text-2xl font-bold text-gray-800">Ventas</h1>
    <p class="text-gray-600 text-sm">Historial de órdenes de tu cuenta</p>
</div>

<!-- ═══ ANÁLISIS DE PRODUCTO ML ═══ -->
<div class="bg-white rounded-xl shadow mb-5">
    <div class="px-4 md:px-6 py-4 border-b border-gray-100">
        <div class="flex items-start justify-between gap-4 flex-wrap">
            <div>
                <h2 class="text-base font-bold text-gray-800">Análisis de Producto ML</h2>
                <p class="text-xs text-gray-400 mt-0.5">Pega un ID MLM o link para ver demanda real, fees exactos y precio tope de compra</p>
            </div>
        </div>
        <div class="flex gap-2 mt-3">
            <input type="text" id="ml-item-id-input"
                   placeholder="MLM1234567890 — o pega el link completo"
                   class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-yellow-400 min-w-0 bg-white"
                   onkeydown="if(event.key==='Enter') window.searchMlItem()">
            <button onclick="window.searchMlItem()" id="ml-item-search-btn"
                    class="px-4 py-2 bg-yellow-400 text-gray-900 text-sm font-semibold rounded-lg hover:bg-yellow-500 transition shrink-0">
                Analizar
            </button>
        </div>
    </div>
    <div id="ml-item-result" class="p-4 md:p-6 empty:hidden"></div>
</div>

<!-- ═══ FILTROS ═══ -->
<div class="bg-white p-4 rounded-xl shadow mb-5">
    <div class="flex flex-wrap gap-3 items-center justify-between">
        <!-- Ordenamiento -->
        <select id="sort-select" name="sort" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none">
            <option value="date_desc">Más recientes</option>
            <option value="date_asc">Más antiguos</option>
        </select>

        <!-- Botones de periodo -->
        <div class="flex rounded-lg border border-gray-200 overflow-hidden text-xs font-medium">
            <button id="ord-p-1"  onclick="window.setOrdPeriod(1)"
                    class="px-2.5 py-1.5 bg-yellow-400 text-gray-900">Hoy</button>
            <button id="ord-p-7"  onclick="window.setOrdPeriod(7)"
                    class="px-2.5 py-1.5 text-gray-600 hover:bg-yellow-50 border-l border-gray-200">7d</button>
            <button id="ord-p-15" onclick="window.setOrdPeriod(15)"
                    class="px-2.5 py-1.5 text-gray-600 hover:bg-yellow-50 border-l border-gray-200">15d</button>
            <button id="ord-p-30" onclick="window.setOrdPeriod(30)"
                    class="px-2.5 py-1.5 text-gray-600 hover:bg-yellow-50 border-l border-gray-200">30d</button>
            <button id="ord-p-all" onclick="window.setOrdPeriod(0)"
                    class="px-2.5 py-1.5 text-gray-600 hover:bg-yellow-50 border-l border-gray-200">Todo</button>
        </div>

        <!-- Fechas personalizadas -->
        <div class="flex gap-2 items-center">
            <input type="date" id="ord-date-custom-from"
                   class="border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none"
                   onchange="window.setOrdCustomDates()">
            <span class="text-xs text-gray-400">a</span>
            <input type="date" id="ord-date-custom-to"
                   class="border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none"
                   onchange="window.setOrdCustomDates()">
        </div>
    </div>

    <!-- Hidden inputs — htmx los incluirá al trigger -->
    <input type="hidden" id="ord-date-from" name="date_from" value="">
    <input type="hidden" id="ord-date-to"   name="date_to"   value="">
</div>

<!-- ═══ TABLA DE ÓRDENES ═══ -->
<div class="bg-white rounded-xl shadow overflow-hidden">
    <div id="orders-table"
         hx-get="/partials/orders-table"
         hx-trigger="load, ordersFilter"
         hx-include="#sort-select, #ord-date-from, #ord-date-to"
         hx-swap="innerHTML">
        <div class="animate-pulse p-4 space-y-3">
            {% for i in range(10) %}
            <div class="h-12 bg-gray-200 rounded"></div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
// ─── Periodo filter ────────────────────────────────────────────────────────────
window._ordActivePeriod = 1;

window._setOrdPeriodBtn = function(days) {
    ['1','7','15','30','all'].forEach(function(k) {
        var btn = document.getElementById('ord-p-' + k);
        if (!btn) return;
        var isActive = (days === 0 && k === 'all') || (String(days) === k);
        if (isActive) {
            btn.classList.add('bg-yellow-400', 'text-gray-900');
            btn.classList.remove('text-gray-600', 'hover:bg-yellow-50');
        } else {
            btn.classList.remove('bg-yellow-400', 'text-gray-900');
            btn.classList.add('text-gray-600', 'hover:bg-yellow-50');
        }
    });
};

window.setOrdPeriod = function(days) {
    window._ordActivePeriod = days;
    var fromEl = document.getElementById('ord-date-from');
    var toEl   = document.getElementById('ord-date-to');
    if (!fromEl || !toEl) return;
    if (days === 0) {
        fromEl.value = '';
        toEl.value   = '';
    } else {
        var now = new Date();
        toEl.value   = now.toISOString().slice(0, 10);
        fromEl.value = new Date(now.getTime() - days * 86400000).toISOString().slice(0, 10);
    }
    // Clear custom inputs when a preset is clicked
    var cf = document.getElementById('ord-date-custom-from');
    var ct = document.getElementById('ord-date-custom-to');
    if (cf) cf.value = '';
    if (ct) ct.value = '';
    window._setOrdPeriodBtn(days);
    htmx.trigger(document.getElementById('orders-table'), 'ordersFilter');
};

window.setOrdCustomDates = function() {
    var cf = document.getElementById('ord-date-custom-from');
    var ct = document.getElementById('ord-date-custom-to');
    var fromEl = document.getElementById('ord-date-from');
    var toEl   = document.getElementById('ord-date-to');
    if (!cf || !ct || !fromEl || !toEl) return;
    if (cf.value && ct.value) {
        fromEl.value = cf.value;
        toEl.value   = ct.value;
        window._setOrdPeriodBtn(-1);
        htmx.trigger(document.getElementById('orders-table'), 'ordersFilter');
    }
};

// Apply default period (Hoy) on load
(function() {
    var now = new Date();
    var fromEl = document.getElementById('ord-date-from');
    var toEl   = document.getElementById('ord-date-to');
    if (fromEl && toEl) {
        toEl.value   = now.toISOString().slice(0, 10);
        fromEl.value = new Date(now.getTime() - 1 * 86400000).toISOString().slice(0, 10);
    }
    window._setOrdPeriodBtn(1);
    // htmx hx-trigger="load" picks these up automatically since they're hidden inputs
})();

// ─── Also re-trigger when sort changes ────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    var sortEl = document.getElementById('sort-select');
    if (sortEl) {
        sortEl.addEventListener('change', function() {
            htmx.trigger(document.getElementById('orders-table'), 'ordersFilter');
        });
    }
});

// ─── MLM Product Analyzer ─────────────────────────────────────────────────────
window.searchMlItem = function() {
    var input = document.getElementById('ml-item-id-input');
    var resultDiv = document.getElementById('ml-item-result');
    var btn = document.getElementById('ml-item-search-btn');
    if (!input || !resultDiv) return;
    var raw = (input.value || '').trim();
    if (!raw) { input.focus(); return; }
    var m = raw.match(/MLM[A-Z0-9]+/i);
    var itemId = m ? m[0].toUpperCase() : raw.toUpperCase();
    resultDiv.innerHTML = '<div class="animate-pulse flex items-center gap-3 py-4"><div class="w-16 h-16 bg-gray-100 rounded shrink-0"></div><div class="flex-1 space-y-2"><div class="h-4 bg-gray-100 rounded w-3/4"></div><div class="h-3 bg-gray-100 rounded w-1/2"></div><div class="h-3 bg-gray-100 rounded w-1/4"></div></div></div>';
    btn.disabled = true; btn.classList.add('opacity-50');
    fetch('/api/ml/item-analysis?item_id=' + encodeURIComponent(itemId))
        .then(function(r) { return r.json(); })
        .then(function(d) {
            btn.disabled = false; btn.classList.remove('opacity-50');
            if (d.error) {
                var errHtml = '<div class="py-3 space-y-1">';
                errHtml += '<p class="text-red-500 text-sm">' + d.error + '</p>';
                if (d.error_link) {
                    errHtml += '<a href="' + d.error_link + '" target="_blank" rel="noopener" class="text-xs text-yellow-600 hover:underline">Verificar en Mercado Libre →</a>';
                }
                errHtml += '</div>';
                resultDiv.innerHTML = errHtml;
                return;
            }
            window._mlItemData = d;
            resultDiv.innerHTML = window._renderMlItem(d);
        })
        .catch(function(e) {
            btn.disabled = false; btn.classList.remove('opacity-50');
            resultDiv.innerHTML = '<p class="text-red-400 text-sm py-3">Error: ' + e.message + '</p>';
        });
};

window._renderMlItem = function(d) {
    var _mxn = function(v) { return '$' + Number(v).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2}); };
    var _pct = function(v) { return Number(v).toFixed(1) + '%'; };
    var _clr = {'green':'bg-green-100 text-green-700','yellow':'bg-yellow-100 text-yellow-700','red':'bg-red-100 text-red-600'};
    var demClr = _clr[d.demand_color] || 'bg-gray-100 text-gray-600';
    var mrgClr = _clr[d.margin_signal] || 'bg-gray-100 text-gray-600';
    var simId = 'mlsim_' + d.item_id;
    var catBadge = d.in_our_catalog
        ? '<span class="px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 text-[10px] font-semibold">En nuestro catálogo</span>'
        : '<span class="px-2 py-0.5 rounded-full bg-gray-100 text-gray-400 text-[10px]">No en catálogo</span>';
    var mlCatBadge = d.is_catalog_product
        ? '<span class="px-2 py-0.5 rounded-full bg-teal-100 text-teal-700 text-[10px] font-semibold">Catálogo ML</span>'
        : '';
    var condBadge = d.condition === 'new'
        ? '<span class="text-[10px] px-1.5 py-0.5 bg-green-50 text-green-600 rounded font-medium">Nuevo</span>'
        : '<span class="text-[10px] px-1.5 py-0.5 bg-gray-50 text-gray-500 rounded">Usado</span>';
    var ltBadge = '<span class="text-[10px] px-1.5 py-0.5 bg-yellow-50 text-yellow-700 rounded font-medium">' + (d.listing_type_label||d.listing_type_id) + '</span>';
    var fullBadge = d.is_full ? '<span class="text-[10px] px-1.5 py-0.5 bg-teal-50 text-teal-600 rounded font-medium">FULL</span>'
        : (d.free_shipping ? '<span class="text-[10px] px-1.5 py-0.5 bg-blue-50 text-blue-500 rounded">Env. gratis</span>' : '');
    var skuBadge = d.seller_sku ? '<span class="text-[10px] px-1.5 py-0.5 bg-purple-50 text-purple-600 rounded font-mono">' + d.seller_sku + '</span>' : '';
    var thumbHtml = d.thumbnail
        ? '<img src="' + d.thumbnail + '" class="w-16 h-16 object-contain rounded border border-gray-100 shrink-0" onerror="this.style.display=\'none\'">'
        : '<div class="w-16 h-16 bg-gray-100 rounded shrink-0 flex items-center justify-center text-gray-300 text-2xl">📦</div>';
    var feeNote = d.fees.is_estimate ? ' <span class="text-[10px] text-gray-400">(estimado)</span>' : '';
    // Usar datos reales de ventas cuando existen, si no estimar
    var rs = d.real_sales;
    var useReal = rs && rs.count >= 1;
    var displayPrice  = useReal ? rs.avg_price      : d.price;
    var displayFeePct = useReal ? rs.avg_fee_pct     : d.fees.sale_fee_pct;
    var displayFeeAmt = useReal ? rs.avg_fee_amt     : d.fees.sale_fee_amount;
    var displayImp    = useReal ? rs.avg_imp          : (d.price * 0.09);
    var displayShip   = useReal ? rs.avg_ship_est     : (d.free_shipping ? 80 : 0);
    var netML  = useReal ? rs.avg_net_ml               : (d.price - d.fees.total_fee_amount - (d.free_shipping ? 80 : 0) - (d.price * 0.09));
    var socioAmt = useReal ? rs.avg_socio              : (netML * 0.07);
    var netEst   = useReal ? rs.avg_neto_final         : (netML - socioAmt);
    var netPct   = displayPrice > 0 ? (netEst / displayPrice * 100).toFixed(1) : 0;
    var html = '<div class="space-y-4">';
    html += '<div class="flex items-start gap-3">' + thumbHtml + '<div class="flex-1 min-w-0">';
    html += '<div class="flex items-start justify-between gap-2">';
    html += '<a href="' + d.permalink + '" target="_blank" rel="noopener" class="text-sm font-semibold text-gray-800 hover:text-yellow-600 leading-snug">' + d.title + '</a>';
    if (d.is_catalog_product) {
        html += '<div class="text-right shrink-0 min-w-[130px]">';
        html += '<div class="flex items-center justify-end gap-1">';
        html += '<span class="text-[10px] text-amber-500">✏</span>';
        html += '<input type="number" id="mlcat_price_' + d.item_id + '" value="' + d.price.toFixed(2) + '" ';
        html += 'class="text-xl font-black text-gray-900 text-right w-32 bg-transparent border-b-2 border-dashed border-amber-300 outline-none focus:border-yellow-500 [appearance:textfield]" ';
        html += 'onchange="window._updateMlCatalogPrice(\'' + d.item_id + '\', this.value)" ';
        html += 'onkeydown="if(event.key===\'Enter\'){window._updateMlCatalogPrice(\'' + d.item_id + '\', this.value);this.blur();}">';
        html += '</div><p class="text-[10px] text-amber-500 text-right">precio catálogo API · editable</p></div>';
    } else if (useReal && Math.abs(rs.avg_price - d.price) > 50) {
        html += '<div class="text-right shrink-0">';
        html += '<p class="text-xl font-black text-gray-900">' + _mxn(rs.avg_price) + '</p>';
        html += '<p class="text-[10px] text-green-600 font-semibold">prom. real (' + rs.count + ' ventas)</p>';
        html += '<p class="text-[10px] text-gray-400 line-through">' + _mxn(d.price) + ' catálogo</p>';
        html += '</div>';
    } else {
        html += '<div class="text-right shrink-0"><p class="text-xl font-black text-gray-900">' + _mxn(d.price) + '</p><p class="text-[10px] text-gray-400">' + d.currency_id + '</p></div>';
    }
    html += '</div><div class="flex flex-wrap gap-1 mt-1.5">' + condBadge + ltBadge + fullBadge + mlCatBadge + catBadge + skuBadge;
    if (useReal) html += '<span class="px-2 py-0.5 rounded-full bg-green-100 text-green-700 text-[10px] font-semibold">✓ ' + rs.count + ' ventas reales</span>';
    html += '</div>';
    html += '<p class="text-xs text-gray-400 mt-1">' + d.category_name + ' · ' + d.item_id + '</p>';
    html += '</div></div>';
    html += '<div class="grid grid-cols-3 gap-3">';
    var demDaysLabel = d.is_catalog_product ? 'en catálogo' : ('en ' + d.days_on_market + ' días');
    html += '<div class="bg-gray-50 rounded-lg p-3"><p class="text-[10px] text-gray-500 font-semibold uppercase tracking-wide mb-1">Vendidas</p>';
    html += '<p class="text-xl font-black text-gray-900 leading-none">' + d.sold_quantity.toLocaleString('es-MX') + ' <span class="text-xs font-normal text-gray-400">uds</span></p>';
    html += '<p class="text-[10px] text-gray-400 mt-0.5">' + demDaysLabel + '</p>';
    html += '<div class="flex items-center gap-1.5 mt-1.5"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ' + demClr + '">' + d.demand_tier + '</span>';
    html += '<span class="text-[10px] text-gray-500">' + d.velocity_per_day + ' ud/día</span></div></div>';
    html += '<div class="bg-gray-50 rounded-lg p-3"><p class="text-[10px] text-gray-500 font-semibold uppercase tracking-wide mb-1.5">Fees ML</p>';
    html += '<span class="px-2 py-0.5 rounded-full text-xs font-bold ' + mrgClr + '">' + _pct(displayFeePct) + ' comisión</span>';
    html += '<p class="text-xs text-gray-700 mt-1.5">' + _mxn(displayFeeAmt) + (useReal ? '' : feeNote) + '</p>';
    if (useReal) html += '<p class="text-[10px] text-green-600 mt-1">sobre precio real promedio</p>';
    else html += '<p class="text-[10px] text-gray-400 mt-0.5">comisión ML directa</p>';
    html += '</div>';
    html += '<div class="bg-gray-50 rounded-lg p-3"><p class="text-[10px] text-gray-500 font-semibold uppercase tracking-wide mb-1">Neto recibido</p>';
    html += '<p class="text-xl font-black text-green-700 leading-none">' + _mxn(Math.max(0, netEst)) + '</p>';
    html += '<p class="text-[10px] ' + (useReal ? 'text-green-600 font-semibold' : 'text-gray-400') + ' mt-0.5">' + netPct + '% del precio' + (useReal ? ' · real' : ' · est.') + '</p>';
    html += '<div class="space-y-0.5 mt-2 border-t border-gray-200 pt-1.5">';
    html += '<div class="flex justify-between text-[10px] text-gray-400"><span>- Comisión ML</span><span>-' + _mxn(displayFeeAmt) + '</span></div>';
    html += '<div class="flex justify-between text-[10px] text-gray-400"><span>- Imp. ML (~9%)</span><span>-' + _mxn(displayImp) + '</span></div>';
    html += '<div class="flex justify-between text-[10px] text-gray-400"><span>- Socio (7%)</span><span>-' + _mxn(socioAmt) + '</span></div>';
    if (displayShip > 0) html += '<div class="flex justify-between text-[10px] text-gray-400"><span>- Envío (est.)</span><span>-' + _mxn(displayShip) + '</span></div>';
    html += '</div></div>';
    html += '</div>';
    html += '<button onclick="window.toggleMlSim(\'' + simId + '\')" class="w-full flex items-center justify-between px-4 py-2.5 bg-yellow-50 border border-yellow-200 rounded-lg text-sm font-semibold text-yellow-800 hover:bg-yellow-100 transition">';
    html += '<span>Calculadora: Precio tope de compra (COGS máximo)</span><span id="' + simId + '_arr">▼</span></button>';
    html += '<div id="' + simId + '" class="hidden">' + window._renderMlSim(simId, d) + '</div></div>';
    return html;
};

window._updateMlCatalogPrice = function(itemId, rawVal) {
    var newPrice = parseFloat(String(rawVal).replace(/,/g, ''));
    if (!newPrice || newPrice <= 0) return;
    var d = window._mlItemData;
    if (!d || d.item_id !== itemId) return;
    d.price = newPrice;
    var fp = d.fees.sale_fee_pct;
    var fa = newPrice * fp / 100;
    var fi = fa * 0.16;
    d.fees.sale_fee_amount = fa;
    d.fees.iva_on_fee = fi;
    d.fees.total_fee_amount = fa + fi;
    var resultDiv = document.getElementById('ml-item-result');
    if (resultDiv) resultDiv.innerHTML = window._renderMlItem(d);
};

window._renderMlSim = function(simId, d) {
    var rs = d.real_sales;
    var useReal = rs && rs.count >= 1;
    var feeDefaultPct = useReal ? Number(rs.avg_fee_pct).toFixed(1) : Number(d.fees.sale_fee_pct || 16.5).toFixed(1);
    var sellDefault   = useReal ? rs.avg_price.toFixed(2) : d.price.toFixed(2);
    var shipDefault   = useReal ? rs.avg_ship_est : (d.free_shipping ? 80 : 0);
    var impDefault    = useReal ? (rs.avg_imp / rs.avg_price * 100).toFixed(2) : '9';
    function row(suffix, label, val, highlight) {
        var cls = 'w-20 text-xs text-right border rounded px-1.5 py-1 focus:outline-none bg-white ' +
            (highlight ? 'border-green-400 focus:border-green-500' : 'border-gray-200 focus:border-yellow-400');
        return '<div class="flex items-center justify-between gap-2">' +
            '<label class="text-[10px] text-gray-600 leading-tight">' + label + '</label>' +
            '<input type="number" id="' + simId + '_' + suffix + '" value="' + val + '" step="0.01" ' +
            'class="' + cls + '" onkeydown="if(event.key===\'Enter\')window.calcMlSim(\'' + simId + '\')">' +
            '</div>';
    }
    var html = '<div class="space-y-3 pt-2">';
    if (useReal) html += '<div class="flex items-center gap-2 px-1"><span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-semibold">✓ Pre-llenado con datos reales de ' + rs.count + ' ventas</span><span class="text-[10px] text-gray-400">· último: ' + (rs.last_sale_date || '') + '</span></div>';
    html += '<div class="grid grid-cols-2 gap-3">';
    html += '<div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 space-y-2"><p class="text-[10px] font-bold text-yellow-700 uppercase tracking-wide mb-1">Ingresos / Fees ML</p>';
    html += row('sell',  'Precio venta ($)',    sellDefault,  useReal);
    html += row('fee',   'Comisión ML (%)',      feeDefaultPct, useReal);
    html += row('imp',   'Impuestos ML (%)',     impDefault,   false);
    html += row('socio', 'Comisión socio (%)',   '7',          false);
    html += row('ship',  'Costo envío (est. $)', shipDefault,  useReal);
    html += row('other', 'Otros costos ($)',     '0',          false);
    html += '</div>';
    html += '<div class="bg-blue-50 border border-blue-200 rounded-lg p-3 space-y-2"><p class="text-[10px] font-bold text-blue-700 uppercase tracking-wide mb-1">Costo / Importación</p>';
    html += row('margin', 'Margen objetivo (%)', '25');
    html += row('tar',    'Aranceles (%)', '0');
    html += row('frt',    'Flete/ud ($)', '0');
    html += '</div></div>';
    html += '<button onclick="window.calcMlSim(\'' + simId + '\')" class="w-full py-2 bg-yellow-400 text-gray-900 text-sm font-semibold rounded-lg hover:bg-yellow-500 transition">Calcular</button>';
    html += '<div id="' + simId + '_res"></div></div>';
    return html;
};

window.toggleMlSim = function(simId) {
    var el = document.getElementById(simId);
    var arr = document.getElementById(simId + '_arr');
    if (!el) return;
    var hidden = el.classList.toggle('hidden');
    if (arr) arr.textContent = hidden ? '▼' : '▲';
    if (!hidden) window.calcMlSim(simId);
};

window.calcMlSim = function(simId) {
    var _v = function(s) { var el = document.getElementById(simId + '_' + s); return el ? (parseFloat(el.value) || 0) : 0; };
    var sellP = _v('sell'), feePct = _v('fee'), impPct = _v('imp'), socioPct = _v('socio'), ship = _v('ship'), other = _v('other');
    var marginPct = _v('margin'), tar = _v('tar'), frt = _v('frt');
    var res = document.getElementById(simId + '_res');
    if (!res) return;
    if (sellP <= 0) { res.innerHTML = '<p class="text-xs text-red-500 text-center py-2">Precio de venta requerido</p>'; return; }
    function calcFor(p, m) {
        var feeAmt  = p * feePct / 100;
        var impAmt  = p * impPct / 100;
        var mlTotal = feeAmt + impAmt + ship + other;
        var netML   = p - mlTotal;
        var socioAmt = netML * socioPct / 100;
        var netProc = netML - socioAmt;
        var landedMax = netProc - (p * m / 100);
        var cogsMax = tar > 0 ? (landedMax - frt) / (1 + tar / 100) : (landedMax - frt);
        return {feeAmt:feeAmt, impAmt:impAmt, mlTotal:mlTotal, netML:netML, socioAmt:socioAmt, netProc:netProc, landedMax:landedMax, cogsMax:cogsMax};
    }
    var main = calcFor(sellP, marginPct);
    var ok = main.cogsMax > 0;
    var _m = function(v) { return '$' + Number(v).toFixed(2); };
    var bg = ok ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-300';
    var tc = ok ? 'text-green-700' : 'text-red-600';
    var html = '<div class="rounded-lg border p-4 ' + bg + '">';
    html += '<p class="text-xs font-semibold ' + tc + ' mb-1">' + (ok ? 'Precio tope de compra (ex-fábrica) al ' + marginPct + '% margen' : 'Margen insuficiente — fees superan el precio') + '</p>';
    html += '<p class="text-3xl font-black ' + tc + '">' + (ok ? _m(main.cogsMax) : '—') + '</p></div>';
    html += '<table class="w-full text-xs mt-3"><thead><tr class="bg-gray-50 text-gray-500"><th class="py-1.5 px-2 text-left">Margen</th><th class="py-1.5 px-2 text-right">COGS máx</th><th class="py-1.5 px-2 text-right">Landed máx</th><th class="py-1.5 px-2 text-right">Neto</th></tr></thead><tbody>';
    [15,20,25,30].forEach(function(m) {
        var r = calcFor(sellP, m);
        var bold = m === marginPct ? ' font-bold bg-yellow-50' : '';
        var clr = r.cogsMax > 0 ? 'text-gray-800' : 'text-red-500';
        html += '<tr class="border-t border-gray-100' + bold + '"><td class="py-1 px-2 ' + clr + '">' + m + '%</td><td class="py-1 px-2 text-right ' + clr + '">' + _m(r.cogsMax) + '</td><td class="py-1 px-2 text-right text-gray-500">' + _m(r.landedMax) + '</td><td class="py-1 px-2 text-right text-gray-500">' + _m(r.netProc) + '</td></tr>';
    });
    html += '</tbody></table>';
    html += '<p class="text-[10px] text-gray-400 mt-2">Desglose: ' + _m(sellP) + ' → comisión ' + _m(main.feeAmt) + ' + imp. ' + _m(main.impAmt) + ' + envío ' + _m(ship) + (other>0?' + otros '+_m(other):'') + ' = ML retiene ' + _m(main.mlTotal) + ' → neto ML ' + _m(main.netML) + ' → socio ' + _m(main.socioAmt) + ' → neto final ' + _m(main.netProc) + '</p>';
    res.innerHTML = html;
};
</script>
