<!-- Partial: lanzar_gaps.html — tabla de SKUs gap BM vs MeLi -->
<!-- Renderizado via JS en sku_inventory.html -->
<div id="gaps-root">
  <!-- Header bar -->
  <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <span class="text-sm font-semibold text-gray-700">SKUs sin publicar</span>
      <span id="gaps-badge" class="bg-red-100 text-red-700 text-xs font-bold px-2 py-0.5 rounded-full">–</span>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="window._gapsLoadAll()" class="text-xs text-gray-500 hover:text-yellow-700 border border-gray-200 px-3 py-1.5 rounded-lg transition hover:border-yellow-400">
        Ver todos
      </button>
      <button onclick="window._scanNow()" id="btn-scan-now"
              class="flex items-center gap-1.5 text-xs font-semibold bg-yellow-400 hover:bg-yellow-500 text-gray-800 px-3 py-1.5 rounded-lg transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Escanear ahora
      </button>
    </div>
  </div>

  <!-- Scan status bar -->
  <div id="scan-status-bar" class="hidden px-4 py-2 bg-blue-50 border-b border-blue-100 text-xs text-blue-700 flex items-center gap-2">
    <svg class="animate-spin w-3.5 h-3.5 text-blue-500" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
    <span id="scan-status-text">Escaneando...</span>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="text-left px-4 py-2.5 font-semibold text-gray-600 text-xs">Producto</th>
          <th class="text-center px-3 py-2.5 font-semibold text-gray-600 text-xs">Stock</th>
          <th class="text-right px-3 py-2.5 font-semibold text-gray-600 text-xs">Precio Sugerido</th>
          <th class="text-right px-3 py-2.5 font-semibold text-gray-600 text-xs">Competencia</th>
          <th class="text-center px-3 py-2.5 font-semibold text-gray-600 text-xs">Prioridad</th>
          <th class="text-center px-3 py-2.5 font-semibold text-gray-600 text-xs">Acciones</th>
        </tr>
      </thead>
      <tbody id="gaps-tbody" class="divide-y divide-gray-100">
        <!-- Filled by JS -->
        <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400 text-sm">Cargando gaps...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div id="gaps-pagination" class="px-4 py-3 border-t border-gray-100"></div>
</div>

<!-- Modal: AI Listing Draft -->
<div id="ai-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
      <div>
        <h3 class="font-bold text-gray-800" id="ai-modal-title">Generar Listing con IA</h3>
        <p class="text-xs text-gray-400 mt-0.5" id="ai-modal-sku"></p>
      </div>
      <button onclick="window._closeAiModal()" class="text-gray-400 hover:text-gray-600 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <!-- Tabs -->
    <div class="flex border-b border-gray-100">
      <button onclick="window._aiTab('draft')" id="tab-draft"
              class="px-4 py-2.5 text-xs font-semibold text-yellow-700 border-b-2 border-yellow-400">
        Borrador IA
      </button>
      <button onclick="window._aiTab('competitor')" id="tab-competitor"
              class="px-4 py-2.5 text-xs font-semibold text-gray-500 border-b-2 border-transparent hover:text-gray-700">
        Competencia
      </button>
    </div>
    <!-- Content area -->
    <div class="flex-1 overflow-y-auto p-5">
      <!-- Draft tab -->
      <div id="panel-draft">
        <div id="ai-stream-output"
             class="font-mono text-xs text-gray-700 whitespace-pre-wrap bg-gray-50 rounded-lg p-4 min-h-[200px] max-h-[50vh] overflow-y-auto border border-gray-200">
          Haz clic en "Generar con IA" para crear el listing.
        </div>
        <button onclick="window._generateDraft()" id="btn-gen-draft"
                class="mt-4 w-full bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-semibold py-2.5 rounded-lg transition text-sm flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          Generar con IA
        </button>
      </div>
      <!-- Competitor tab -->
      <div id="panel-competitor" class="hidden">
        <div id="comp-loading" class="text-center py-8 text-gray-400 text-sm">Cargando competidores...</div>
        <div id="comp-list" class="space-y-3 hidden"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var _gaps = [];
  var _gapsMeta = { total: 0, offset: 0, limit: 50 };
  var _currentGap = null;
  var _scanPolling = null;

  // ── Load gaps from API ──────────────────────────────────────────────────────
  function _loadGaps(offset) {
    offset = offset || 0;
    _gapsMeta.offset = offset;
    fetch('/api/lanzar/gaps?limit=' + _gapsMeta.limit + '&offset=' + offset)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        _gaps = data.items || [];
        _gapsMeta.total = data.total || 0;
        _renderTable();
        _renderPagination();
        var badge = document.getElementById('gaps-badge');
        if (badge) badge.textContent = _gapsMeta.total;
      })
      .catch(function() {
        document.getElementById('gaps-tbody').innerHTML =
          '<tr><td colspan="6" class="px-4 py-6 text-center text-red-500 text-sm">Error cargando gaps</td></tr>';
      });
  }

  window._gapsLoadAll = function() {
    _gapsMeta.limit = 500;
    _loadGaps(0);
  };

  // ── Render table rows ───────────────────────────────────────────────────────
  function _renderTable() {
    var tbody = document.getElementById('gaps-tbody');
    if (!_gaps.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-10 text-center text-gray-400 text-sm">' +
        '<div class="text-2xl mb-2">🎉</div>' +
        'Todos los SKUs con stock están publicados en esta cuenta.' +
        '</td></tr>';
      return;
    }
    tbody.innerHTML = _gaps.map(function(g) {
      var scoreColor = g.priority_score >= 70 ? 'text-red-600 font-bold' :
                       g.priority_score >= 40 ? 'text-yellow-600 font-semibold' : 'text-gray-500';
      var priceStr = g.suggested_price_mxn > 0 ? '$' + Math.round(g.suggested_price_mxn).toLocaleString() : '—';
      var compStr  = g.competitor_price > 0   ? '$' + Math.round(g.competitor_price).toLocaleString() : '—';
      var imgTag   = g.image_url
        ? '<img src="' + g.image_url + '" class="w-10 h-10 object-contain rounded border border-gray-100 flex-shrink-0" onerror="this.style.display=\'none\'">'
        : '<div class="w-10 h-10 bg-gray-100 rounded border border-gray-200 flex-shrink-0 flex items-center justify-center text-gray-400 text-xs">IMG</div>';
      return '<tr class="hover:bg-gray-50 transition">' +
        '<td class="px-4 py-3">' +
          '<div class="flex items-center gap-3">' + imgTag +
          '<div>' +
            '<div class="font-medium text-gray-800 text-xs leading-tight max-w-[260px] truncate" title="' + (g.product_title || '') + '">' +
              (g.product_title || g.sku) +
            '</div>' +
            '<div class="text-gray-400 text-xs mt-0.5">' +
              '<span class="font-mono">' + g.sku + '</span>' +
              (g.brand ? ' · ' + g.brand : '') +
              (g.model ? ' · ' + g.model : '') +
            '</div>' +
          '</div></div>' +
        '</td>' +
        '<td class="px-3 py-3 text-center">' +
          '<span class="text-gray-700 font-medium text-xs">' + (g.stock_total || 0) + '</span>' +
        '</td>' +
        '<td class="px-3 py-3 text-right">' +
          '<span class="text-gray-700 text-xs">' + priceStr + ' MXN</span>' +
        '</td>' +
        '<td class="px-3 py-3 text-right">' +
          '<span class="text-gray-500 text-xs">' + compStr + '</span>' +
        '</td>' +
        '<td class="px-3 py-3 text-center">' +
          '<span class="text-xs ' + scoreColor + '">' + g.priority_score + '</span>' +
        '</td>' +
        '<td class="px-3 py-3">' +
          '<div class="flex items-center justify-center gap-1.5">' +
            '<button onclick="window._openAiModal(' + JSON.stringify(g).replace(/"/g, '&quot;') + ')" ' +
              'class="text-xs bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-semibold px-2.5 py-1.5 rounded-lg transition" ' +
              'title="Preparar y lanzar">Lanzar</button>' +
            '<button onclick="window._ignoreGap(\'' + g.sku + '\')" ' +
              'class="text-xs text-gray-400 hover:text-red-500 border border-gray-200 hover:border-red-300 px-2 py-1.5 rounded-lg transition" ' +
              'title="Ignorar">✕</button>' +
          '</div>' +
        '</td>' +
        '</tr>';
    }).join('');
  }

  // ── Pagination ──────────────────────────────────────────────────────────────
  function _renderPagination() {
    var cont = document.getElementById('gaps-pagination');
    if (!cont) return;
    var total = _gapsMeta.total;
    var limit = _gapsMeta.limit;
    var offset = _gapsMeta.offset;
    if (total <= limit) { cont.innerHTML = ''; return; }
    var page = Math.floor(offset / limit) + 1;
    var pages = Math.ceil(total / limit);
    cont.innerHTML = '<div class="flex items-center justify-between text-xs text-gray-500">' +
      '<span>Mostrando ' + (offset+1) + '–' + Math.min(offset+limit, total) + ' de ' + total + '</span>' +
      '<div class="flex gap-1">' +
        (page > 1 ? '<button onclick="window._gapsPage(' + (page-1) + ')" class="px-3 py-1.5 border border-gray-200 rounded hover:border-yellow-400 transition">‹</button>' : '') +
        '<span class="px-3 py-1.5">' + page + ' / ' + pages + '</span>' +
        (page < pages ? '<button onclick="window._gapsPage(' + (page+1) + ')" class="px-3 py-1.5 border border-gray-200 rounded hover:border-yellow-400 transition">›</button>' : '') +
      '</div></div>';
  }

  window._gapsPage = function(page) {
    _loadGaps((page - 1) * _gapsMeta.limit);
  };

  // ── Ignore gap ──────────────────────────────────────────────────────────────
  window._ignoreGap = function(sku) {
    fetch('/api/lanzar/ignore/' + encodeURIComponent(sku), { method: 'POST' })
      .then(function() { _loadGaps(_gapsMeta.offset); });
  };

  // ── Scan now ────────────────────────────────────────────────────────────────
  window._scanNow = function() {
    var btn = document.getElementById('btn-scan-now');
    btn.disabled = true; btn.classList.add('opacity-50');
    fetch('/api/lanzar/scan-now', { method: 'POST' })
      .then(function() { _startScanPolling(); });
  };

  function _startScanPolling() {
    var bar = document.getElementById('scan-status-bar');
    var txt = document.getElementById('scan-status-text');
    if (bar) bar.classList.remove('hidden');
    if (_scanPolling) clearInterval(_scanPolling);
    _scanPolling = setInterval(function() {
      fetch('/api/lanzar/scan-status')
        .then(function(r) { return r.json(); })
        .then(function(s) {
          if (s.status === 'running') {
            if (txt) txt.textContent = 'Escaneando BinManager y cuentas MeLi...';
          } else {
            clearInterval(_scanPolling);
            if (bar) bar.classList.add('hidden');
            var btn = document.getElementById('btn-scan-now');
            if (btn) { btn.disabled = false; btn.classList.remove('opacity-50'); }
            if (s.status === 'done') {
              _loadGaps(0);
            } else if (s.status === 'error') {
              alert('Error en el scan: ' + (s.error || 'desconocido'));
            }
          }
        });
    }, 3000);
  }

  // Check if scan is already running on load
  fetch('/api/lanzar/scan-status')
    .then(function(r) { return r.json(); })
    .then(function(s) { if (s.status === 'running') _startScanPolling(); });

  // ── AI Modal ────────────────────────────────────────────────────────────────
  window._openAiModal = function(gap) {
    _currentGap = gap;
    document.getElementById('ai-modal').classList.remove('hidden');
    document.getElementById('ai-modal-title').textContent =
      (gap.brand || '') + ' ' + (gap.model || gap.sku);
    document.getElementById('ai-modal-sku').textContent = 'SKU: ' + gap.sku;
    document.getElementById('ai-stream-output').textContent =
      'Haz clic en "Generar con IA" para crear el listing.';
    _aiTab('draft');
  };

  window._closeAiModal = function() {
    document.getElementById('ai-modal').classList.add('hidden');
    _currentGap = null;
  };

  window._aiTab = function(tab) {
    document.getElementById('panel-draft').classList.toggle('hidden', tab !== 'draft');
    document.getElementById('panel-competitor').classList.toggle('hidden', tab !== 'competitor');
    document.getElementById('tab-draft').className =
      'px-4 py-2.5 text-xs font-semibold border-b-2 ' +
      (tab === 'draft' ? 'text-yellow-700 border-yellow-400' : 'text-gray-500 border-transparent hover:text-gray-700');
    document.getElementById('tab-competitor').className =
      'px-4 py-2.5 text-xs font-semibold border-b-2 ' +
      (tab === 'competitor' ? 'text-yellow-700 border-yellow-400' : 'text-gray-500 border-transparent hover:text-gray-700');
    if (tab === 'competitor' && _currentGap) {
      _loadCompetitors(_currentGap);
    }
  };

  window._generateDraft = function() {
    if (!_currentGap) return;
    var btn = document.getElementById('btn-gen-draft');
    btn.disabled = true; btn.classList.add('opacity-50');
    var output = document.getElementById('ai-stream-output');
    output.textContent = '';

    fetch('/api/lanzar/ai-draft', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_currentGap)
    }).then(function(r) {
      var reader = r.body.getReader();
      var decoder = new TextDecoder();
      function read() {
        reader.read().then(function(result) {
          if (result.done) {
            btn.disabled = false; btn.classList.remove('opacity-50');
            return;
          }
          output.textContent += decoder.decode(result.value, { stream: true });
          output.scrollTop = output.scrollHeight;
          read();
        });
      }
      read();
    }).catch(function(e) {
      output.textContent = 'Error: ' + e;
      btn.disabled = false; btn.classList.remove('opacity-50');
    });
  };

  function _loadCompetitors(gap) {
    var loading = document.getElementById('comp-loading');
    var list = document.getElementById('comp-list');
    if (loading) loading.classList.remove('hidden');
    if (list) list.classList.add('hidden');

    fetch('/api/lanzar/prepare/' + encodeURIComponent(gap.sku))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (loading) loading.classList.add('hidden');
        var comps = data.competitors || [];
        if (!comps.length) {
          if (list) { list.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">Sin competidores encontrados</p>'; list.classList.remove('hidden'); }
          return;
        }
        if (list) {
          list.innerHTML = comps.map(function(c) {
            return '<div class="border border-gray-100 rounded-lg p-3">' +
              '<div class="flex items-start justify-between gap-2">' +
                '<div class="flex-1 min-w-0">' +
                  '<p class="text-xs font-medium text-gray-800 leading-tight">' + (c.title || '') + '</p>' +
                  '<p class="text-xs text-gray-400 mt-0.5">' + (c.seller || '') + ' · ' + (c.condition || '') + '</p>' +
                '</div>' +
                '<div class="text-right flex-shrink-0">' +
                  '<p class="text-sm font-bold text-gray-800">$' + ((c.price||0).toLocaleString()) + '</p>' +
                  '<p class="text-xs text-gray-400">' + (c.sold_qty||0) + ' vendidos</p>' +
                '</div>' +
              '</div>' +
            '</div>';
          }).join('');
          list.classList.remove('hidden');
        }
      })
      .catch(function() {
        if (loading) loading.textContent = 'Error cargando competidores';
      });
  }

  // ── Initial load ────────────────────────────────────────────────────────────
  _loadGaps(0);

  // Close modal on backdrop click
  document.getElementById('ai-modal').addEventListener('click', function(e) {
    if (e.target === this) window._closeAiModal();
  });
})();
</script>
