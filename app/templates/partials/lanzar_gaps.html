<!-- Partial: lanzar_gaps.html — Lanzador Inteligente con filtros, paginación y modal IA -->
<div id="gaps-root">

  <!-- ── Header bar ──────────────────────────────────────────────────────────── -->
  <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <span class="text-sm font-semibold text-gray-700">SKUs sin publicar</span>
      <span id="gaps-badge" class="bg-red-100 text-red-700 text-xs font-bold px-2 py-0.5 rounded-full">–</span>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="window._scanNow()" id="btn-scan-now"
              class="flex items-center gap-1.5 text-xs font-semibold bg-yellow-400 hover:bg-yellow-500 text-gray-800 px-3 py-1.5 rounded-lg transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Escanear ahora
      </button>
    </div>
  </div>

  <!-- ── Scan status bar ────────────────────────────────────────────────────── -->
  <div id="scan-status-bar" class="hidden px-4 py-2 bg-blue-50 border-b border-blue-100 text-xs text-blue-700 flex items-center gap-2">
    <svg class="animate-spin w-3.5 h-3.5 text-blue-500 flex-shrink-0" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
    <span id="scan-status-text">Escaneando BinManager vs MeLi — esto puede tomar 2-3 min...</span>
  </div>

  <!-- ── Summary stats ─────────────────────────────────────────────────────── -->
  <div id="gaps-stats" class="hidden px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex flex-wrap gap-4 text-xs text-gray-600"></div>

  <!-- ── Status tabs ───────────────────────────────────────────────────────── -->
  <div class="flex gap-0 border-b border-gray-100 px-4 pt-2">
    <button id="tab-unlaunched" onclick="window._gapsSetStatus('unlaunched')"
            class="gaps-status-tab px-3 py-1.5 text-xs font-semibold border-b-2 border-yellow-400 text-yellow-700 mr-2">
      Sin publicar
    </button>
    <button id="tab-ignored" onclick="window._gapsSetStatus('ignored')"
            class="gaps-status-tab px-3 py-1.5 text-xs font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-600 mr-2">
      Ignorados
    </button>
  </div>

  <!-- ── Filters & controls ────────────────────────────────────────────────── -->
  <div class="px-4 py-3 border-b border-gray-100 flex flex-wrap gap-2 items-center bg-white">
    <!-- Search -->
    <input id="gaps-search" type="text" placeholder="Buscar SKU o producto..."
           class="text-xs border border-gray-200 rounded-lg px-3 py-1.5 w-44 focus:outline-none focus:border-yellow-400"
           oninput="window._gapsDebounce()"/>

    <!-- Category -->
    <select id="gaps-cat" onchange="window._gapsFilter()"
            class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-yellow-400 max-w-[180px]">
      <option value="">Todas las categorías</option>
    </select>

    <!-- Brand -->
    <select id="gaps-brand" onchange="window._gapsFilter()"
            class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-yellow-400 max-w-[140px]">
      <option value="">Todas las marcas</option>
    </select>

    <!-- Min stock -->
    <select id="gaps-min-stock" onchange="window._gapsFilter()"
            class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-yellow-400">
      <option value="0">Stock: todos</option>
      <option value="5">Stock ≥ 5</option>
      <option value="10">Stock ≥ 10</option>
      <option value="50">Stock ≥ 50</option>
      <option value="100">Stock ≥ 100</option>
    </select>

    <!-- Min price -->
    <select id="gaps-min-price" onchange="window._gapsFilter()"
            class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-yellow-400">
      <option value="0">Precio: todos</option>
      <option value="50">USD ≥ $50</option>
      <option value="100">USD ≥ $100</option>
      <option value="200">USD ≥ $200</option>
      <option value="500">USD ≥ $500</option>
    </select>

    <!-- Sort -->
    <select id="gaps-sort" onchange="window._gapsFilter()"
            class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-yellow-400">
      <option value="priority">Prioridad ↓</option>
      <option value="stock_desc">Stock mayor → menor</option>
      <option value="stock_asc">Stock menor → mayor</option>
      <option value="price_desc">Precio USD ↓</option>
      <option value="price_asc">Precio USD ↑</option>
      <option value="name_asc">Nombre A→Z</option>
    </select>

    <!-- Per page -->
    <select id="gaps-per-page" onchange="window._gapsFilter()"
            class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-yellow-400">
      <option value="10" selected>10 por página</option>
      <option value="25">25 por página</option>
      <option value="50">50 por página</option>
      <option value="100">100 por página</option>
    </select>

    <!-- Reset -->
    <button onclick="window._gapsReset()"
            class="text-xs text-gray-400 hover:text-gray-600 underline">Limpiar</button>
  </div>

  <!-- ── Table ─────────────────────────────────────────────────────────────── -->
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="text-left px-4 py-2.5 font-semibold text-gray-600 text-xs">Producto</th>
          <th class="text-center px-3 py-2.5 font-semibold text-gray-600 text-xs cursor-pointer hover:text-yellow-700"
              onclick="window._gapsSortBy('stock_desc')">Stock ⇅</th>
          <th class="text-center px-3 py-2.5 font-semibold text-gray-600 text-xs">Categoría BM</th>
          <th class="text-right px-3 py-2.5 font-semibold text-gray-600 text-xs cursor-pointer hover:text-yellow-700"
              onclick="window._gapsSortBy('price_desc')">Precio USD ⇅</th>
          <th class="text-right px-3 py-2.5 font-semibold text-gray-600 text-xs">Precio MXN Sug.</th>
          <th class="text-right px-3 py-2.5 font-semibold text-gray-600 text-xs">Competencia</th>
          <th class="text-center px-3 py-2.5 font-semibold text-gray-600 text-xs cursor-pointer hover:text-yellow-700"
              onclick="window._gapsSortBy('priority')">Prior. ⇅</th>
          <th class="text-center px-3 py-2.5 font-semibold text-gray-600 text-xs">Acciones</th>
        </tr>
      </thead>
      <tbody id="gaps-tbody" class="divide-y divide-gray-100">
        <tr><td colspan="8" class="px-4 py-8 text-center text-gray-400 text-sm">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ── Pagination ────────────────────────────────────────────────────────── -->
  <div id="gaps-pagination" class="px-4 py-3 border-t border-gray-100"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════ -->
<!-- Modal: AI Listing Draft                                                     -->
<!-- ═══════════════════════════════════════════════════════════════════════════ -->
<div id="ai-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
      <div>
        <h3 class="font-bold text-gray-800" id="ai-modal-title">Generar Listing con IA</h3>
        <p class="text-xs text-gray-400 mt-0.5" id="ai-modal-sku"></p>
      </div>
      <button onclick="window._closeAiModal()" class="text-gray-400 hover:text-gray-600 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="flex border-b border-gray-100">
      <button onclick="window._aiTab('draft')" id="tab-draft"
              class="px-4 py-2.5 text-xs font-semibold text-yellow-700 border-b-2 border-yellow-400">
        Borrador IA
      </button>
      <button onclick="window._aiTab('competitor')" id="tab-competitor"
              class="px-4 py-2.5 text-xs font-semibold text-gray-500 border-b-2 border-transparent hover:text-gray-700">
        Competencia
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-5">
      <div id="panel-draft">
        <div id="ai-stream-output"
             class="font-mono text-xs text-gray-700 whitespace-pre-wrap bg-gray-50 rounded-lg p-4 min-h-[200px] max-h-[50vh] overflow-y-auto border border-gray-200">
          Haz clic en "Generar con IA" para crear el listing.
        </div>
        <button onclick="window._generateDraft()" id="btn-gen-draft"
                class="mt-4 w-full bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-semibold py-2.5 rounded-lg transition text-sm flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          Generar con IA
        </button>
      </div>
      <div id="panel-competitor" class="hidden">
        <div id="comp-loading" class="text-center py-8 text-gray-400 text-sm">Cargando competidores...</div>
        <div id="comp-list" class="space-y-3 hidden"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // ── State ───────────────────────────────────────────────────────────────────
  var _state = {
    page: 1, per_page: 10, sort: 'priority', status: 'unlaunched',
    category: '', brand: '', search: '', min_stock: 0, min_price: 0,
    total: 0, pages: 1, badge_total: 0,
  };
  var _gaps = [];
  var _currentGap = null;
  var _scanPolling = null;
  var _debounceTimer = null;

  // ── Build query string ───────────────────────────────────────────────────────
  function _qs() {
    var p = [
      'page=' + _state.page,
      'per_page=' + _state.per_page,
      'sort=' + _state.sort,
      'status=' + _state.status,
    ];
    if (_state.category) p.push('category=' + encodeURIComponent(_state.category));
    if (_state.brand)    p.push('brand='    + encodeURIComponent(_state.brand));
    if (_state.search)   p.push('search='   + encodeURIComponent(_state.search));
    if (_state.min_stock > 0)  p.push('min_stock='  + _state.min_stock);
    if (_state.min_price > 0)  p.push('min_price='  + _state.min_price);
    return '?' + p.join('&');
  }

  // ── Load gaps ────────────────────────────────────────────────────────────────
  function _loadGaps() {
    var tbody = document.getElementById('gaps-tbody');
    tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-6 text-center text-gray-300 text-sm">Cargando...</td></tr>';

    fetch('/api/lanzar/gaps' + _qs())
      .then(function(r) { return r.json(); })
      .then(function(d) {
        _gaps = d.items || [];
        _state.total    = d.total || 0;
        _state.pages    = d.pages || 1;
        _state.badge_total = d.badge_total || d.total || 0;
        _renderBadge();
        _renderTable();
        _renderPagination();
      })
      .catch(function(e) {
        tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-6 text-center text-red-400 text-sm">Error: ' + e + '</td></tr>';
      });
  }

  // ── Load filters (categories + brands + stats) ───────────────────────────────
  function _loadFilters() {
    fetch('/api/lanzar/filters')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        // Category select
        var catSel = document.getElementById('gaps-cat');
        var prev = catSel.value;
        catSel.innerHTML = '<option value="">Todas las categorías (' + d.total_gaps + ')</option>';
        (d.categories || []).forEach(function(c) {
          var opt = document.createElement('option');
          opt.value = c.category;
          opt.textContent = c.category + ' (' + c.count + ')';
          catSel.appendChild(opt);
        });
        catSel.value = prev;

        // Brand select
        var brandSel = document.getElementById('gaps-brand');
        var prevB = brandSel.value;
        brandSel.innerHTML = '<option value="">Todas las marcas</option>';
        (d.brands || []).forEach(function(b) {
          var opt = document.createElement('option');
          opt.value = b.brand;
          opt.textContent = b.brand + ' (' + b.count + ')';
          brandSel.appendChild(opt);
        });
        brandSel.value = prevB;

        // Stats bar
        var stats = document.getElementById('gaps-stats');
        if (d.total_gaps > 0) {
          var revStr = d.revenue_potential_mxn > 0
            ? ' · <span class="text-green-700 font-semibold">$' + Math.round(d.revenue_potential_mxn).toLocaleString() + ' MXN potencial</span>'
            : '';
          stats.innerHTML =
            '<span>' + d.total_gaps + ' SKUs sin publicar</span>' +
            '<span>· ' + (d.total_stock || 0).toLocaleString() + ' uds en BM</span>' +
            revStr;
          stats.classList.remove('hidden');
        }
      });
  }

  function _renderBadge() {
    var badge = document.getElementById('gaps-badge');
    if (badge) badge.textContent = _state.badge_total;
  }

  // ── Render table ──────────────────────────────────────────────────────────────
  function _renderTable() {
    var tbody = document.getElementById('gaps-tbody');
    if (!_gaps.length) {
      var msg = _state.status === 'ignored'
        ? 'No hay SKUs ignorados.'
        : 'Sin resultados con los filtros aplicados.';
      tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-10 text-center text-gray-400 text-sm">' +
        '<div class="text-2xl mb-2">🎉</div>' + msg + '</td></tr>';
      return;
    }
    tbody.innerHTML = _gaps.map(function(g) {
      var scoreColor = g.priority_score >= 70 ? 'text-red-600 font-bold' :
                       g.priority_score >= 40 ? 'text-yellow-600 font-semibold' : 'text-gray-500';
      var priceUsd  = g.retail_price_usd > 0   ? '$' + g.retail_price_usd.toFixed(2)  : '—';
      var priceMxn  = g.suggested_price_mxn > 0 ? '$' + Math.round(g.suggested_price_mxn).toLocaleString() : '—';
      var compStr   = g.competitor_price > 0    ? '$' + Math.round(g.competitor_price).toLocaleString() : '—';
      var imgTag    = g.image_url
        ? '<img src="' + g.image_url + '" class="w-9 h-9 object-contain rounded border border-gray-100 flex-shrink-0" onerror="this.style.display=\'none\'">'
        : '<div class="w-9 h-9 bg-gray-100 rounded border border-gray-200 flex-shrink-0 flex items-center justify-center text-gray-300 text-[10px]">IMG</div>';
      var catBadge  = g.category
        ? '<span class="px-1 py-0.5 bg-blue-50 text-blue-600 text-[9px] rounded border border-blue-100">' + g.category + '</span>'
        : '<span class="text-gray-300 text-[9px]">—</span>';

      return '<tr class="hover:bg-gray-50 transition">' +
        '<td class="px-4 py-3 max-w-xs">' +
          '<div class="flex items-center gap-2">' + imgTag +
          '<div class="min-w-0">' +
            '<div class="font-medium text-gray-800 text-xs leading-tight truncate" title="' + (g.product_title || '') + '">' +
              (g.product_title || g.sku) +
            '</div>' +
            '<div class="text-gray-400 text-[10px] mt-0.5 flex gap-1 flex-wrap">' +
              '<span class="font-mono bg-gray-50 px-1 rounded border border-gray-100">' + g.sku + '</span>' +
              (g.brand ? '<span>' + g.brand + '</span>' : '') +
              (g.model ? '<span class="truncate max-w-[120px]">' + g.model + '</span>' : '') +
            '</div>' +
          '</div></div>' +
        '</td>' +
        '<td class="px-3 py-3 text-center">' +
          '<span class="text-gray-700 font-semibold text-xs">' + (g.stock_total || 0).toLocaleString() + '</span>' +
        '</td>' +
        '<td class="px-3 py-3 text-center">' + catBadge + '</td>' +
        '<td class="px-3 py-3 text-right">' +
          '<span class="text-gray-600 text-xs font-mono">' + priceUsd + '</span>' +
        '</td>' +
        '<td class="px-3 py-3 text-right">' +
          '<span class="text-gray-700 text-xs">' + priceMxn + ' MXN</span>' +
        '</td>' +
        '<td class="px-3 py-3 text-right">' +
          '<span class="text-gray-400 text-xs">' + compStr + '</span>' +
        '</td>' +
        '<td class="px-3 py-3 text-center">' +
          '<span class="text-xs ' + scoreColor + '">' + g.priority_score + '</span>' +
        '</td>' +
        '<td class="px-3 py-3">' +
          '<div class="flex items-center justify-center gap-1.5">' +
            '<button onclick="window._openAiModal(' + JSON.stringify(g).replace(/"/g, '&quot;') + ')" ' +
              'class="text-xs bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-semibold px-2.5 py-1.5 rounded-lg transition">Lanzar</button>' +
            (g.status === 'unlaunched'
              ? '<button onclick="window._ignoreGap(\'' + g.sku + '\')" ' +
                'class="text-xs text-gray-400 hover:text-red-500 border border-gray-200 hover:border-red-300 px-2 py-1.5 rounded-lg transition" title="Ignorar">✕</button>'
              : '<button onclick="window._restoreGap(\'' + g.sku + '\')" ' +
                'class="text-xs text-blue-400 hover:text-blue-600 border border-gray-200 hover:border-blue-300 px-2 py-1.5 rounded-lg transition" title="Restaurar">↩</button>'
            ) +
          '</div>' +
        '</td>' +
        '</tr>';
    }).join('');
  }

  // ── Pagination ────────────────────────────────────────────────────────────────
  function _renderPagination() {
    var cont = document.getElementById('gaps-pagination');
    if (!cont) return;
    var total = _state.total, pp = _state.per_page, page = _state.page, pages = _state.pages;
    var from = (page - 1) * pp + 1, to = Math.min(page * pp, total);

    if (total === 0) { cont.innerHTML = ''; return; }

    var html = '<div class="flex items-center justify-between text-xs text-gray-500">' +
      '<span>Mostrando ' + from + '–' + to + ' de ' + total + '</span>' +
      '<div class="flex gap-1 items-center">';

    if (page > 1) html += '<button onclick="window._gapsGoPage(' + (page-1) + ')" class="px-2.5 py-1 border border-gray-200 rounded hover:border-yellow-400 transition">‹</button>';

    // Show up to 5 page buttons
    var start = Math.max(1, page - 2), end = Math.min(pages, start + 4);
    for (var i = start; i <= end; i++) {
      html += '<button onclick="window._gapsGoPage(' + i + ')" class="px-2.5 py-1 border rounded transition ' +
        (i === page ? 'border-yellow-400 bg-yellow-50 font-bold text-yellow-700' : 'border-gray-200 hover:border-yellow-400') + '">' + i + '</button>';
    }

    if (page < pages) html += '<button onclick="window._gapsGoPage(' + (page+1) + ')" class="px-2.5 py-1 border border-gray-200 rounded hover:border-yellow-400 transition">›</button>';
    html += '</div></div>';
    cont.innerHTML = html;
  }

  window._gapsGoPage = function(p) {
    _state.page = p;
    _loadGaps();
    window.scrollTo(0, 0);
  };

  // ── Filter controls ───────────────────────────────────────────────────────────
  window._gapsFilter = function() {
    _state.page      = 1;
    _state.category  = document.getElementById('gaps-cat').value;
    _state.brand     = document.getElementById('gaps-brand').value;
    _state.sort      = document.getElementById('gaps-sort').value;
    _state.per_page  = parseInt(document.getElementById('gaps-per-page').value) || 10;
    _state.min_stock = parseInt(document.getElementById('gaps-min-stock').value) || 0;
    _state.min_price = parseFloat(document.getElementById('gaps-min-price').value) || 0;
    _state.search    = document.getElementById('gaps-search').value.trim();
    _loadGaps();
  };

  window._gapsDebounce = function() {
    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(window._gapsFilter, 400);
  };

  window._gapsSortBy = function(sort) {
    document.getElementById('gaps-sort').value = sort;
    window._gapsFilter();
  };

  window._gapsSetStatus = function(status) {
    _state.status = status;
    _state.page   = 1;
    document.querySelectorAll('.gaps-status-tab').forEach(function(t) {
      t.className = 'gaps-status-tab px-3 py-1.5 text-xs font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-600 mr-2';
    });
    document.getElementById('tab-' + status).className =
      'gaps-status-tab px-3 py-1.5 text-xs font-semibold border-b-2 border-yellow-400 text-yellow-700 mr-2';
    _loadGaps();
  };

  window._gapsReset = function() {
    document.getElementById('gaps-search').value    = '';
    document.getElementById('gaps-cat').value        = '';
    document.getElementById('gaps-brand').value      = '';
    document.getElementById('gaps-min-stock').value  = '0';
    document.getElementById('gaps-min-price').value  = '0';
    document.getElementById('gaps-sort').value       = 'priority';
    document.getElementById('gaps-per-page').value   = '10';
    _state.category = ''; _state.brand = ''; _state.search = '';
    _state.min_stock = 0; _state.min_price = 0;
    _state.sort = 'priority'; _state.per_page = 10; _state.page = 1;
    _loadGaps();
  };

  // ── Gap actions ───────────────────────────────────────────────────────────────
  window._ignoreGap = function(sku) {
    fetch('/api/lanzar/ignore/' + encodeURIComponent(sku), { method: 'POST' })
      .then(function() { _loadGaps(); _loadFilters(); });
  };

  window._restoreGap = function(sku) {
    fetch('/api/lanzar/restore/' + encodeURIComponent(sku), { method: 'POST' })
      .then(function() { _loadGaps(); _loadFilters(); });
  };

  // ── Scan ──────────────────────────────────────────────────────────────────────
  window._scanNow = function() {
    var btn = document.getElementById('btn-scan-now');
    btn.disabled = true; btn.classList.add('opacity-50');
    fetch('/api/lanzar/scan-now', { method: 'POST' }).then(function() { _startScanPolling(); });
  };

  function _startScanPolling() {
    var bar = document.getElementById('scan-status-bar');
    var txt = document.getElementById('scan-status-text');
    if (bar) bar.classList.remove('hidden');
    if (_scanPolling) clearInterval(_scanPolling);
    _scanPolling = setInterval(function() {
      fetch('/api/lanzar/scan-status').then(function(r) { return r.json(); }).then(function(s) {
        if (s.status === 'running') {
          if (txt) txt.textContent = 'Escaneando BinManager vs MeLi... (' + (s.total_skus || 0) + ' SKUs procesados)';
        } else {
          clearInterval(_scanPolling);
          if (bar) bar.classList.add('hidden');
          var btn = document.getElementById('btn-scan-now');
          if (btn) { btn.disabled = false; btn.classList.remove('opacity-50'); }
          if (s.status === 'done') {
            _loadGaps(); _loadFilters();
          } else if (s.status === 'error') {
            alert('Error en el scan: ' + (s.error || 'desconocido'));
          }
        }
      });
    }, 3000);
  }

  // ── AI Modal ──────────────────────────────────────────────────────────────────
  window._openAiModal = function(gap) {
    _currentGap = gap;
    document.getElementById('ai-modal').classList.remove('hidden');
    document.getElementById('ai-modal-title').textContent =
      (gap.brand || '') + ' ' + (gap.model || gap.sku);
    document.getElementById('ai-modal-sku').textContent =
      'SKU: ' + gap.sku + (gap.category ? ' · ' + gap.category : '');
    document.getElementById('ai-stream-output').textContent =
      'Haz clic en "Generar con IA" para crear el listing.';
    _aiTab('draft');
  };

  window._closeAiModal = function() {
    document.getElementById('ai-modal').classList.add('hidden');
    _currentGap = null;
  };

  window._aiTab = function(tab) {
    document.getElementById('panel-draft').classList.toggle('hidden', tab !== 'draft');
    document.getElementById('panel-competitor').classList.toggle('hidden', tab !== 'competitor');
    document.getElementById('tab-draft').className =
      'px-4 py-2.5 text-xs font-semibold border-b-2 ' +
      (tab === 'draft' ? 'text-yellow-700 border-yellow-400' : 'text-gray-500 border-transparent hover:text-gray-700');
    document.getElementById('tab-competitor').className =
      'px-4 py-2.5 text-xs font-semibold border-b-2 ' +
      (tab === 'competitor' ? 'text-yellow-700 border-yellow-400' : 'text-gray-500 border-transparent hover:text-gray-700');
    if (tab === 'competitor' && _currentGap) _loadCompetitors(_currentGap);
  };

  window._generateDraft = function() {
    if (!_currentGap) return;
    var btn = document.getElementById('btn-gen-draft');
    btn.disabled = true; btn.classList.add('opacity-50');
    var output = document.getElementById('ai-stream-output');
    output.textContent = '';

    fetch('/api/lanzar/ai-draft', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_currentGap),
    }).then(function(r) {
      var reader = r.body.getReader(), dec = new TextDecoder();
      function read() {
        reader.read().then(function(res) {
          if (res.done) { btn.disabled = false; btn.classList.remove('opacity-50'); return; }
          output.textContent += dec.decode(res.value, { stream: true });
          output.scrollTop = output.scrollHeight;
          read();
        });
      }
      read();
    }).catch(function(e) {
      output.textContent = 'Error: ' + e;
      btn.disabled = false; btn.classList.remove('opacity-50');
    });
  };

  function _loadCompetitors(gap) {
    var loading = document.getElementById('comp-loading'), list = document.getElementById('comp-list');
    if (loading) loading.classList.remove('hidden');
    if (list) list.classList.add('hidden');
    fetch('/api/lanzar/prepare/' + encodeURIComponent(gap.sku))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (loading) loading.classList.add('hidden');
        var comps = data.competitors || [];
        if (!comps.length) {
          if (list) { list.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">Sin competidores encontrados</p>'; list.classList.remove('hidden'); }
          return;
        }
        if (list) {
          list.innerHTML = comps.map(function(c) {
            return '<div class="border border-gray-100 rounded-lg p-3">' +
              '<div class="flex items-start justify-between gap-2">' +
                '<div class="flex-1 min-w-0">' +
                  '<p class="text-xs font-medium text-gray-800 leading-tight">' + (c.title || '') + '</p>' +
                  '<p class="text-xs text-gray-400 mt-0.5">' + (c.seller || '') + ' · ' + (c.condition || '') + '</p>' +
                '</div>' +
                '<div class="text-right flex-shrink-0">' +
                  '<p class="text-sm font-bold text-gray-800">$' + ((c.price||0).toLocaleString()) + '</p>' +
                  '<p class="text-xs text-gray-400">' + (c.sold_qty||0) + ' vendidos</p>' +
                '</div>' +
              '</div>' +
            '</div>';
          }).join('');
          list.classList.remove('hidden');
        }
      })
      .catch(function() { if (loading) loading.textContent = 'Error cargando competidores'; });
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  fetch('/api/lanzar/scan-status')
    .then(function(r) { return r.json(); })
    .then(function(s) { if (s.status === 'running') _startScanPolling(); });

  _loadFilters();
  _loadGaps();
})();
</script>
