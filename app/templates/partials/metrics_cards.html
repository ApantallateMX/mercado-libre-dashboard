<div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6 md:mb-8">
    <a href="/orders" class="kpi-card bg-white rounded-xl shadow-sm border-t-4 border-amber-400 p-4 md:p-5 block group">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-3">Órdenes</p>
        <p class="text-3xl md:text-4xl font-black text-gray-800 tabular-nums leading-none">{{ metrics.summary.total_orders }}</p>
        <p class="text-xs text-amber-500 mt-3 group-hover:underline transition">Ver órdenes →</p>
    </a>
    <a href="/orders" class="kpi-card bg-white rounded-xl shadow-sm border-t-4 border-emerald-400 p-4 md:p-5 block group">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-3">Ventas Pagadas</p>
        <p class="text-3xl md:text-4xl font-black text-emerald-600 tabular-nums leading-none">{{ metrics.summary.monthly_sales }}</p>
        <p class="text-xs text-emerald-500 mt-3 group-hover:underline transition">Órdenes entregadas →</p>
    </a>
    <a href="/sku-sales" class="kpi-card bg-white rounded-xl shadow-sm border-t-4 border-yellow-400 p-4 md:p-5 block group">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-3">Ingresos Netos</p>
        <p class="text-2xl md:text-3xl font-black text-gray-800 tabular-nums leading-none truncate">${{ "%.0f"|format(metrics.summary.monthly_revenue) }}</p>
        <p class="text-xs text-yellow-600 mt-3 group-hover:underline transition">Desglose por SKU →</p>
    </a>
    <a href="/items" class="kpi-card bg-white rounded-xl shadow-sm border-t-4 border-blue-400 p-4 md:p-5 block group">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-3">Productos Activos</p>
        <p class="text-3xl md:text-4xl font-black text-blue-600 tabular-nums leading-none">{{ metrics.summary.active_items }}</p>
        <p class="text-xs text-blue-500 mt-3 group-hover:underline transition">Ver catálogo →</p>
    </a>
</div>
