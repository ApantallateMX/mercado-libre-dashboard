[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -v --tb=short --color=yes
markers =
    slow: Tests que llaman APIs externas (MeLi, BM, Amazon) — pueden tardar
    auth: Tests que requieren sesión válida (TEST_SESSION env var)
    integration: Tests de integración end-to-end
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
